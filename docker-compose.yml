version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      - ODOO_BASE_URL=${ODOO_BASE_URL}
      - NEXT_PUBLIC_ODOO_HOST=${NEXT_PUBLIC_ODOO_HOST}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - APP_NAME=${APP_NAME:-Rewards}
      - APP_LOGO_URL=${APP_LOGO_URL:-}
      - REWARDS_DOMAIN=${REWARDS_DOMAIN:-}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - SYNC_API_KEY=${SYNC_API_KEY}
    volumes:
      - config_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  config_data:
  certbot_www:
